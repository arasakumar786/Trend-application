apiVersion : apps/v1
kind: Deployment
metadata:
  name: trend-deployment
spec:
  replicas: 3 
  selector:
    matchLabels:
      app: trend-v1
  template:
    metadata:
      labels:
        app: trend-v1 
    spec:
      containers: 
      - name: trend-container
        image: trend:v1
        ports:
        - containerPort: 8080
